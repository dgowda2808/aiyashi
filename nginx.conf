# ── Verified Dating — Nginx config ──────────────────────────────────
# Place at: /etc/nginx/sites-available/datemap
# Enable:   sudo ln -s /etc/nginx/sites-available/datemap /etc/nginx/sites-enabled/
# Test:     sudo nginx -t
# Reload:   sudo systemctl reload nginx

server {
    listen 80;
    server_name 187.127.140.170;    # replace with your domain or server IP

    # Redirect HTTP → HTTPS (uncomment once SSL is set up)
    # return 301 https://$host$request_uri;

    # ── Proxy to Node.js ──
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket support (required for Socket.io)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  86400;   # long timeout for WebSocket connections
        proxy_send_timeout  86400;
    }

    # ── Serve uploaded photos directly (bypass Node for static files) ──
    location /uploads/ {
        alias /var/www/datemap/public/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
    }

    # ── Upload size limit ──
    client_max_body_size 10M;
}

